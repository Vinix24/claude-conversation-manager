<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Session Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
:root {
  --navy: #0A2463;
  --navy-dark: #061845;
  --orange: #F97316;
  --orange-light: #FB923C;
  --terracotta: #D97757;
  --terracotta-light: #E8956F;
  --accent: #E5F6FF;
  --content-dark: #1a1a2e;
  --surface-dark: #1e1e32;
  --surface-deep: #151528;
  --surface-soft: rgba(229, 246, 255, 0.05);
  --surface-strong: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.10);
  --border-strong: rgba(217, 119, 87, 0.28);
  --text-bright: #F3F5FA;
  --text-muted: rgba(243, 245, 250, 0.72);
  --text-dim: rgba(243, 245, 250, 0.42);
  --danger: #ff6b6b;
  --success: #4ade80;
  --chart-blue: #8bd3ff;
  --chart-orange: #F97316;
  --chart-terracotta: #D97757;
  --chart-gold: #f4b942;
  --sidebar-width: 250px;
  --list-width: 430px;
  --file-width: 0px;
  --handle-width: 6px;
  --file-handle-width: 0px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --shadow-soft: 0 18px 48px rgba(5, 10, 30, 0.4);
  --shadow-panel: 0 12px 30px rgba(6, 24, 69, 0.28);
  --transition: 160ms ease;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  height: 100%;
}

body {
  font-family: "IBM Plex Sans", system-ui, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(249, 115, 22, 0.16), transparent 34%),
    radial-gradient(circle at 88% 0%, rgba(10, 36, 99, 0.55), transparent 28%),
    linear-gradient(180deg, #111223 0%, #0f1324 100%);
  color: var(--text-bright);
  overflow: hidden;
}

button,
input,
select {
  font: inherit;
}

.app {
  display: grid;
  grid-template-rows: 4px 64px 1fr 30px;
  height: 100vh;
}

.accent-bar {
  background: linear-gradient(90deg, var(--terracotta), var(--orange), var(--navy));
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  background: rgba(10, 36, 99, 0.92);
  border-bottom: 1px solid rgba(229, 246, 255, 0.14);
  backdrop-filter: blur(18px);
  -webkit-app-region: drag;
}

.toolbar > * {
  -webkit-app-region: no-drag;
}

.toolbar-brand {
  min-width: 220px;
}

.toolbar-title {
  font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.toolbar-subtitle {
  font-size: 12px;
  color: var(--text-dim);
}

.search-shell {
  position: relative;
  flex: 1;
  max-width: 540px;
}

.search-shell svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  color: var(--text-dim);
}

.search-input {
  width: 100%;
  border: 1px solid rgba(229, 246, 255, 0.16);
  background: rgba(6, 24, 69, 0.55);
  color: var(--text-bright);
  padding: 10px 14px 10px 36px;
  border-radius: 999px;
  outline: none;
  transition: border-color var(--transition), background var(--transition);
}

.search-input:focus {
  border-color: rgba(249, 115, 22, 0.5);
  background: rgba(6, 24, 69, 0.8);
}

.toolbar-select,
.toolbar-btn {
  border: 1px solid rgba(229, 246, 255, 0.14);
  background: rgba(229, 246, 255, 0.08);
  color: var(--text-bright);
  border-radius: 999px;
  padding: 9px 14px;
  cursor: pointer;
  transition: transform var(--transition), background var(--transition), border-color var(--transition);
}

.toolbar-btn:hover,
.toolbar-select:hover {
  transform: translateY(-1px);
  background: rgba(229, 246, 255, 0.14);
}

.toolbar-btn.primary {
  background: linear-gradient(135deg, rgba(249, 115, 22, 0.18), rgba(217, 119, 87, 0.24));
  border-color: rgba(249, 115, 22, 0.32);
}

.toolbar-btn.active {
  background: linear-gradient(135deg, rgba(249, 115, 22, 0.26), rgba(217, 119, 87, 0.34));
  border-color: rgba(249, 115, 22, 0.45);
}

.main-panels {
  display: grid;
  grid-template-columns: var(--sidebar-width) var(--handle-width) var(--list-width) var(--handle-width) minmax(460px, 1fr) var(--file-handle-width) var(--file-width);
  height: 100%;
  overflow: hidden;
}

.resize-handle {
  position: relative;
  cursor: col-resize;
  background: transparent;
  transition: background var(--transition);
}

.resize-handle:hover,
.resize-handle.active {
  background: rgba(249, 115, 22, 0.22);
}

.resize-handle::after {
  content: "";
  position: absolute;
  inset: 0;
  margin: auto;
  width: 2px;
  height: 100%;
  background: rgba(229, 246, 255, 0.12);
}

.resize-handle.hidden {
  cursor: default;
  pointer-events: none;
}

.resize-handle.hidden::after {
  opacity: 0;
}

.panel {
  min-height: 0;
  overflow: hidden;
}

.sidebar {
  background: linear-gradient(180deg, rgba(10, 36, 99, 0.96), rgba(6, 24, 69, 0.98));
  border-right: 1px solid rgba(229, 246, 255, 0.12);
  display: flex;
  flex-direction: column;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 18px 18px 14px;
  border-bottom: 1px solid rgba(229, 246, 255, 0.08);
}

.panel-kicker {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.panel-heading {
  font-family: "Space Grotesk", sans-serif;
  font-size: 16px;
}

.panel-header-meta {
  font-size: 12px;
  color: var(--text-muted);
}

.sidebar-scroll,
.list-scroll,
.main-scroll,
.file-tree,
.file-preview {
  overflow: auto;
}

.sidebar-scroll {
  padding: 10px 10px 22px;
}

.project-tree {
  display: grid;
  gap: 4px;
}

.project-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 8px;
  padding: 11px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  transition: background var(--transition), color var(--transition), transform var(--transition);
}

.project-item:hover {
  background: rgba(229, 246, 255, 0.07);
  color: var(--text-bright);
  transform: translateX(2px);
}

.project-item.active {
  background: linear-gradient(135deg, rgba(249, 115, 22, 0.18), rgba(217, 119, 87, 0.2));
  color: var(--text-bright);
}

.project-item.folder-scope {
  font-weight: 600;
}

.project-toggle {
  width: 18px;
  height: 18px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 6px;
  padding: 0;
  display: grid;
  place-items: center;
  font-size: 11px;
  transition: transform var(--transition), background var(--transition), color var(--transition);
}

.project-toggle:hover {
  background: rgba(229, 246, 255, 0.08);
  color: var(--text-bright);
}

.project-toggle.expanded {
  transform: rotate(90deg);
}

.project-toggle.placeholder {
  visibility: hidden;
  cursor: default;
}

.project-label {
  min-width: 0;
}

.project-row-meta {
  margin-top: 3px;
  font-size: 11px;
  color: var(--text-dim);
}

.project-name {
  font-weight: 600;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-count {
  min-width: 30px;
  padding: 3px 8px;
  border-radius: 999px;
  text-align: center;
  font-size: 11px;
  background: rgba(255, 255, 255, 0.07);
  color: var(--text-dim);
}

.project-item.active .project-count {
  color: var(--accent);
}

.conversations-panel {
  background: rgba(16, 20, 38, 0.96);
  border-right: 1px solid rgba(229, 246, 255, 0.08);
  display: flex;
  flex-direction: column;
}

.list-scroll {
  padding: 14px 14px 22px;
}

.conversation-card {
  background: linear-gradient(180deg, rgba(30, 30, 50, 0.88), rgba(21, 21, 40, 0.96));
  border: 1px solid rgba(229, 246, 255, 0.08);
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
  box-shadow: var(--shadow-panel);
}

.conversation-card:hover {
  transform: translateY(-2px);
  border-color: rgba(249, 115, 22, 0.28);
}

.conversation-card.active {
  border-color: rgba(249, 115, 22, 0.4);
  box-shadow: 0 12px 30px rgba(249, 115, 22, 0.12);
}

.conversation-topline {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}

.conversation-title {
  font-weight: 700;
  font-size: 14px;
  line-height: 1.35;
}

.conversation-project {
  font-size: 12px;
  color: var(--accent);
  opacity: 0.88;
  margin-top: 2px;
}

.conversation-date {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}

.conversation-excerpt {
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}

.conversation-preview-label {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 5px;
}

.conversation-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.manual-resume {
  margin-top: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(229, 246, 255, 0.04);
  border: 1px solid rgba(229, 246, 255, 0.08);
}

.manual-resume-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.manual-resume code {
  display: inline-block;
  font-size: 12px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(5, 9, 20, 0.6);
  color: var(--accent);
  word-break: break-all;
}

.pill-btn {
  border: 1px solid rgba(229, 246, 255, 0.12);
  background: rgba(229, 246, 255, 0.05);
  color: var(--text-bright);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
}

.pill-btn.primary {
  background: rgba(217, 119, 87, 0.18);
  border-color: rgba(217, 119, 87, 0.34);
}

.main-panel {
  background: linear-gradient(180deg, rgba(17, 19, 35, 0.98), rgba(12, 15, 30, 1));
  display: flex;
  flex-direction: column;
}

.main-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 18px 22px 14px;
  border-bottom: 1px solid rgba(229, 246, 255, 0.08);
}

.main-title {
  font-family: "Space Grotesk", sans-serif;
  font-size: 22px;
  letter-spacing: -0.02em;
}

.main-subtitle {
  color: var(--text-muted);
  font-size: 13px;
  margin-top: 4px;
}

.main-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.main-scroll {
  padding: 24px;
}

.dashboard-filterbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.dashboard-filter-group {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.filter-chip {
  border-radius: 999px;
  padding: 8px 12px;
  background: rgba(229, 246, 255, 0.06);
  border: 1px solid rgba(229, 246, 255, 0.10);
  font-size: 12px;
  color: var(--text-muted);
}

.filter-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
}

.dashboard-select {
  border: 1px solid rgba(229, 246, 255, 0.14);
  background: rgba(229, 246, 255, 0.06);
  color: var(--text-bright);
  border-radius: 12px;
  padding: 9px 12px;
  min-width: 140px;
}

.dashboard-hero {
  background:
    radial-gradient(circle at top right, rgba(249, 115, 22, 0.14), transparent 32%),
    linear-gradient(135deg, rgba(10, 36, 99, 0.85), rgba(6, 24, 69, 0.92));
  border: 1px solid rgba(229, 246, 255, 0.12);
  border-radius: 24px;
  padding: 24px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 18px;
}

.dashboard-hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.8fr) minmax(280px, 1fr);
  gap: 20px;
}

.hero-kicker {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: rgba(229, 246, 255, 0.72);
  margin-bottom: 10px;
}

.hero-title {
  font-family: "Space Grotesk", sans-serif;
  font-size: clamp(28px, 4vw, 38px);
  line-height: 1.05;
  margin: 0 0 12px;
}

.hero-copy {
  max-width: 720px;
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.7;
}

.hero-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.tag {
  border-radius: 999px;
  padding: 8px 12px;
  background: rgba(229, 246, 255, 0.08);
  border: 1px solid rgba(229, 246, 255, 0.12);
  font-size: 12px;
  color: var(--text-muted);
}

.hero-note {
  padding: 18px;
  border-radius: 18px;
  background: rgba(0, 0, 0, 0.16);
  border: 1px solid rgba(229, 246, 255, 0.08);
}

.hero-note h3 {
  margin: 0 0 10px;
  font-size: 14px;
  font-family: "Space Grotesk", sans-serif;
}

.hero-note p {
  margin: 0 0 8px;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
}

.section-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: 16px;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}

.metric-card,
.surface-card {
  background: linear-gradient(180deg, rgba(30, 30, 50, 0.92), rgba(16, 19, 35, 0.96));
  border: 1px solid rgba(229, 246, 255, 0.08);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-panel);
  min-width: 0;
}

.metric-card {
  padding: 18px;
}

.metric-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
}

.metric-value {
  font-family: "Space Grotesk", sans-serif;
  font-size: 26px;
  margin-top: 10px;
}

.metric-caption {
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}

.surface-card {
  padding: 18px;
}

.span-6 { grid-column: span 6; }
.span-5 { grid-column: span 5; }
.span-4 { grid-column: span 4; }
.span-7 { grid-column: span 7; }
.span-8 { grid-column: span 8; }
.span-12 { grid-column: span 12; }

.section-heading {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}

.section-title {
  font-family: "Space Grotesk", sans-serif;
  font-size: 18px;
}

.section-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 5px;
}

.legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--text-muted);
}

.legend-swatch {
  display: inline-flex;
  width: 10px;
  height: 10px;
  border-radius: 999px;
  margin-right: 6px;
}

.chart-shell {
  width: 100%;
}

.chart-caption {
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-muted);
}

.timeline-bars {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(12px, 1fr));
  gap: 6px;
  align-items: end;
  min-height: 220px;
}

.timeline-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.timeline-stack {
  width: 100%;
  min-height: 170px;
  display: flex;
  flex-direction: column-reverse;
  border-radius: 999px;
  background: rgba(229, 246, 255, 0.06);
  overflow: hidden;
}

.timeline-segment {
  width: 100%;
  min-height: 2px;
}

.timeline-label {
  font-size: 10px;
  color: var(--text-dim);
  transform: rotate(-70deg);
  transform-origin: center;
  white-space: nowrap;
}

.bar-list {
  display: grid;
  gap: 10px;
}

.bar-row {
  display: grid;
  grid-template-columns: minmax(0, 180px) minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
}

.bar-label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 13px;
}

.bar-track {
  height: 12px;
  border-radius: 999px;
  background: rgba(229, 246, 255, 0.07);
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 999px;
}

.bar-value {
  font-size: 12px;
  color: var(--text-muted);
}

.heatmap-grid {
  display: grid;
  grid-template-columns: 54px repeat(24, minmax(16px, 1fr));
  gap: 6px;
}

.heatmap-hour,
.heatmap-day {
  font-size: 11px;
  color: var(--text-dim);
}

.heatmap-day {
  display: flex;
  align-items: center;
}

.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 6px;
  background: rgba(229, 246, 255, 0.05);
  border: 1px solid rgba(229, 246, 255, 0.02);
}

.heatmap-legend {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-muted);
}

.histogram {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  min-height: 180px;
}

.histogram-bar {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.histogram-value {
  font-size: 11px;
  color: var(--text-dim);
}

.histogram-fill {
  width: 100%;
  min-height: 2px;
  border-radius: 12px 12px 4px 4px;
  background: linear-gradient(180deg, rgba(249, 115, 22, 0.9), rgba(217, 119, 87, 0.72));
}

.histogram-label {
  font-size: 10px;
  color: var(--text-dim);
  transform: rotate(-55deg);
  white-space: nowrap;
}

.table-shell {
  overflow: auto;
  border-radius: 16px;
  border: 1px solid rgba(229, 246, 255, 0.08);
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

th,
td {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(229, 246, 255, 0.06);
  text-align: left;
  vertical-align: top;
}

th {
  position: sticky;
  top: 0;
  background: rgba(16, 19, 35, 0.98);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
}

tbody tr:hover {
  background: rgba(229, 246, 255, 0.03);
}

.table-title {
  font-weight: 600;
  font-size: 13px;
}

.table-project,
.table-secondary {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

.detail-header {
  background:
    radial-gradient(circle at top right, rgba(249, 115, 22, 0.14), transparent 26%),
    linear-gradient(135deg, rgba(10, 36, 99, 0.84), rgba(17, 19, 35, 0.96));
  border: 1px solid rgba(229, 246, 255, 0.1);
  border-radius: 24px;
  padding: 24px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-soft);
}

.detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.meta-chip {
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(229, 246, 255, 0.08);
  border: 1px solid rgba(229, 246, 255, 0.12);
  font-size: 12px;
  color: var(--text-muted);
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
  margin-top: 18px;
}

.detail-stat {
  background: rgba(17, 19, 35, 0.42);
  border: 1px solid rgba(229, 246, 255, 0.08);
  border-radius: 16px;
  padding: 14px;
}

.detail-stat .value {
  font-family: "Space Grotesk", sans-serif;
  font-size: 22px;
  margin-top: 10px;
}

.transcript {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}

.transcript.reverse {
  flex-direction: column-reverse;
}

.message-card {
  padding: 16px 18px;
  border-radius: 18px;
  border: 1px solid rgba(229, 246, 255, 0.08);
  background: rgba(255, 255, 255, 0.03);
  min-width: 0;
  overflow: hidden;
}

.message-card.user {
  background: rgba(229, 246, 255, 0.04);
  border-color: rgba(229, 246, 255, 0.12);
}

.message-card.assistant {
  background: rgba(217, 119, 87, 0.08);
  border-color: rgba(217, 119, 87, 0.18);
}

.message-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.message-role {
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.message-meta {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.message-body {
  color: var(--text-bright);
  font-size: 14px;
  line-height: 1.7;
  min-width: 0;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.message-body p { margin: 0 0 10px; }
.message-body p:last-child { margin-bottom: 0; }
.message-body p,
.message-body li,
.message-body blockquote {
  overflow-wrap: anywhere;
  word-break: break-word;
}
.message-body code {
  background: rgba(0,0,0,0.28);
  padding: 2px 5px;
  border-radius: 6px;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.message-body pre {
  background: rgba(5, 9, 20, 0.72);
  border-radius: 12px;
  padding: 14px;
  overflow: auto;
  max-width: 100%;
}
.message-body pre code {
  display: block;
  min-width: 0;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
}
.message-body ul,
.message-body ol { padding-left: 20px; }
.message-body blockquote { border-left: 3px solid var(--terracotta); margin: 0; padding-left: 14px; color: var(--text-muted); }

.empty-state {
  min-height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--text-muted);
}

.empty-shell {
  max-width: 440px;
}

.empty-icon {
  width: 68px;
  height: 68px;
  border-radius: 24px;
  margin: 0 auto 16px;
  display: grid;
  place-items: center;
  background: rgba(229, 246, 255, 0.08);
  border: 1px solid rgba(229, 246, 255, 0.1);
  font-size: 28px;
}

.empty-title {
  font-family: "Space Grotesk", sans-serif;
  font-size: 24px;
  margin-bottom: 10px;
}

.empty-copy {
  font-size: 14px;
  line-height: 1.7;
}

.file-panel {
  width: 0;
  border-left: 0 solid rgba(229, 246, 255, 0.08);
  background: rgba(12, 16, 30, 0.98);
  display: flex;
  flex-direction: column;
  transition: width var(--transition), border-color var(--transition);
}

.file-panel.open {
  width: 370px;
  border-left-width: 1px;
}

.file-tree {
  flex: 0 0 42%;
  border-bottom: 1px solid rgba(229, 246, 255, 0.06);
  padding: 10px;
}

.file-preview {
  flex: 1;
  padding: 12px 14px 18px;
}

.tree-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 10px;
  color: var(--text-muted);
  cursor: pointer;

}

.tree-item:hover,
.tree-item.active {
  background: rgba(229, 246, 255, 0.06);
  color: var(--text-bright);
}

.tree-indent {
  width: 12px;
  flex: 0 0 12px;
}

.file-preview-shell {
  background: rgba(229, 246, 255, 0.03);
  border: 1px solid rgba(229, 246, 255, 0.08);
  border-radius: 16px;
  padding: 14px;

.statusbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 0 16px;
  border-top: 1px solid rgba(229, 246, 255, 0.1);
  background: rgba(10, 36, 99, 0.92);

.toast {
  position: fixed;
  right: 22px;
  bottom: 44px;
  z-index: 999;
  padding: 10px 14px;
  border-radius: 12px;
  color: white;
  background: rgba(220, 38, 38, 0.94);
  box-shadow: var(--shadow-soft);
  animation: toastIn 0.2s ease, toastOut 0.2s ease 3.1s forwards;
}

.toast.success {
  background: rgba(22, 163, 74, 0.94);
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

::-webkit-scrollbar {
  width: 7px;
  height: 7px;
}

::-webkit-scrollbar-thumb {
  background: rgba(229, 246, 255, 0.16);
  border-radius: 999px;

@media (max-width: 1420px) {

    grid-template-columns: repeat(3, minmax(0, 1fr));

@media (max-width: 1200px) {

    grid-template-columns: 220px var(--handle-width) 360px var(--handle-width) minmax(360px, 1fr) var(--file-handle-width) var(--file-width);
  }

  .dashboard-hero-grid,
  .detail-grid {

  }

  .span-8,
  .span-7,
  .span-6,
  .span-5,

    grid-column: span 12;
  }
}

<body>
<div class="app">
  <div class="accent-bar"></div>

  <div class="toolbar">
    <div class="toolbar-brand">
      <div class="toolbar-title" id="toolbarTitle">Claude Code Session Dashboard</div>
      <div class="toolbar-subtitle">Local-first search, resume, and usage insights for Claude Code</div>
    </div>

    <div class="search-shell">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m20 20-3.5-3.5"></path>
      </svg>
      <input class="search-input" id="searchInput" placeholder="Search titles, prompts, and message text">
    </div>

    <select class="toolbar-select" id="sortSelect">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="tokens">Most tokens</option>
      <option value="cost">Highest cost</option>

      <option value="title">Title A-Z</option>
    </select>

    <button class="toolbar-btn primary active" id="overviewBtn">Overview</button>
    <button class="toolbar-btn" id="filesBtn">Files</button>
    <button class="toolbar-btn" id="reindexBtn">Reindex</button>
  </div>

  <div class="main-panels" id="mainPanels">
    <aside class="panel sidebar">
      <div class="panel-header">
        <div>
          <div class="panel-kicker">Projects</div>
          <div class="panel-heading">Browse sessions</div>
        </div>
        <div class="panel-header-meta" id="projectMeta">0 projects</div>
      </div>
      <div class="sidebar-scroll" id="projectList"></div>
    </aside>

    <div class="resize-handle" data-resize="sidebar" title="Resize projects"></div>

    <section class="panel conversations-panel">
      <div class="panel-header">
        <div>
          <div class="panel-kicker">Conversation Manager</div>
          <div class="panel-heading" id="conversationPanelTitle">All sessions</div>
        </div>
        <div class="panel-header-meta" id="conversationCount">0 sessions</div>
      </div>
      <div class="list-scroll" id="conversationList"></div>
    </section>

    <div class="resize-handle" data-resize="list" title="Resize session list"></div>

    <main class="panel main-panel">
      <div class="main-topbar">

          <div class="main-title" id="mainTitle">Usage overview</div>
          <div class="main-subtitle" id="mainSubtitle">Loading Claude Code session metrics...</div>
        </div>
        <div class="main-actions" id="mainActions"></div>
      </div>
      <div class="main-scroll" id="mainContent"></div>
    </main>

    <div class="resize-handle hidden" id="fileResizeHandle" data-resize="file" title="Resize file browser"></div>

    <aside class="panel file-panel" id="filePanel">
      <div class="panel-header">
        <div>
          <div class="panel-kicker">File Browser</div>
          <div class="panel-heading">Local files</div>
        </div>
        <button class="toolbar-btn" id="closeFilesBtn">Close</button>
      </div>
      <div class="file-tree" id="fileTree"></div>
      <div class="file-preview" id="filePreview"></div>
    </aside>
  </div>

  <div class="statusbar">
    <div class="statusbar-group">
      <span id="statusSessions">Loading sessions...</span>
      <span id="statusTokens"></span>
      <span id="statusCost"></span>
    </div>
    <div class="statusbar-group">
      <span id="statusLastIndexed"></span>
      <span id="statusTerminal"></span>
    </div>
  </div>
</div>

<script>
marked.setOptions({
  breaks: true,
  gfm: true,
  highlight(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
});

const state = {
  appStats: null,
  projects: [],
  conversations: [],
  dashboard: null,
  selectedProject: 'all',
  selectedConversationId: null,
  selectedConversationDetail: null,
  searchQuery: '',
  sort: 'newest',
  fileTree: null,
  filePanelOpen: false,
  selectedFilePath: null,
  view: 'dashboard',
  searchTimer: null,
  dashboardRange: '30d',
  dashboardMonth: null,
  expandedProjectPaths: new Set(['all']),
  transcriptOrder: 'newest',
};
let initStarted = false;
const UI_STATE_STORAGE_KEY = 'claude-session-dashboard.ui.v1';

function escHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

function formatDate(value) {
  if (!value) return 'Unknown date';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString(undefined, {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
  });
}

function formatDateTime(value) {
  if (!value) return 'Unknown date';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString(undefined, {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
  });
}

function formatTokens(value) {
  const amount = Number(value || 0);
  if (amount >= 1_000_000) return `${(amount / 1_000_000).toFixed(amount >= 10_000_000 ? 1 : 2)}M`;
  if (amount >= 1_000) return `${(amount / 1_000).toFixed(amount >= 100_000 ? 0 : 1)}k`;
  return amount.toLocaleString();
}

function formatMoney(value) {
  return `$${Number(value || 0).toLocaleString(undefined, {
    minimumFractionDigits: value >= 100 ? 0 : 2,
    maximumFractionDigits: 2,
  })}`;
}

function formatDuration(seconds) {
  const totalSeconds = Math.max(0, Number(seconds || 0));
  const totalMinutes = Math.round(totalSeconds / 60);
  const days = Math.floor(totalMinutes / (60 * 24));
  const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
  const minutes = totalMinutes % 60;
  if (days > 0 && hours > 0) return `${days}d ${hours}h`;
  if (days > 0) return `${days}d`;
  if (hours > 0 && minutes > 0) return `${hours}h ${minutes}m`;
  if (hours > 0) return `${hours}h`;
  return `${Math.max(1, totalMinutes)}m`;
}

function shortSessionId(sessionId) {
  return sessionId ? sessionId.slice(0, 8) : '--------';
}

function relativeProjectName(projectPath) {
  if (!projectPath) return 'Unknown project';
  const parts = projectPath.split('/').filter(Boolean);
  return parts.slice(-2).join('/') || projectPath;
}

function loadUiState() {
  try {
    const raw = window.localStorage.getItem(UI_STATE_STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.sort === 'date') {
      state.sort = 'newest';
    } else if (['newest', 'oldest', 'tokens', 'cost', 'messages', 'title'].includes(saved.sort)) {
      state.sort = saved.sort;
    }
    if (['7d', '30d', '90d', 'month'].includes(saved.dashboardRange)) {
      state.dashboardRange = saved.dashboardRange;
    }
    if (typeof saved.dashboardMonth === 'string' || saved.dashboardMonth === null) {
      state.dashboardMonth = saved.dashboardMonth;
    }
    if (typeof saved.selectedProject === 'string' && saved.selectedProject) {
      state.selectedProject = saved.selectedProject;
    }
    if (['newest', 'oldest'].includes(saved.transcriptOrder)) {
      state.transcriptOrder = saved.transcriptOrder;
    }
    if (Array.isArray(saved.expandedProjectPaths)) {
      state.expandedProjectPaths = new Set(saved.expandedProjectPaths);
    }
  } catch (_error) {
    // Ignore invalid persisted UI state and fall back to defaults.
  }
}

function persistUiState() {
  try {
    window.localStorage.setItem(UI_STATE_STORAGE_KEY, JSON.stringify({
      sort: state.sort,
      dashboardRange: state.dashboardRange,
      dashboardMonth: state.dashboardMonth,
      selectedProject: state.selectedProject,
      transcriptOrder: state.transcriptOrder,
      expandedProjectPaths: Array.from(state.expandedProjectPaths),
    }));
  } catch (_error) {
    // Ignore storage failures in private browsing or locked-down environments.
  }
}

function buildProjectTree(projects) {
  const root = {
    label: 'All projects',
    scopePath: 'all',
    count: projects.reduce((sum, project) => sum + Number(project.count || 0), 0),
    latest: projects[0]?.latest || null,
    children: [],
    childMap: new Map(),
    depth: 0,
  };

  for (const project of projects) {
    const segments = (project.project_path || 'unknown').split('/').filter(Boolean);
    let current = root;
    let cumulative = '';

    segments.forEach((segment, index) => {
      cumulative = cumulative ? `${cumulative}/${segment}` : segment;
      if (!current.childMap.has(segment)) {
        const child = {
          label: segment,
          scopePath: cumulative,
          count: 0,
          latest: null,
          children: [],
          childMap: new Map(),
          depth: index + 1,
        };
        current.childMap.set(segment, child);
        current.children.push(child);
      }

      current = current.childMap.get(segment);
      current.count += Number(project.count || 0);
      if (!current.latest || (project.latest && project.latest > current.latest)) {
        current.latest = project.latest;
      }
    });
  }

  const finalize = (node) => {
    node.children.sort((left, right) => {
      if ((right.count || 0) !== (left.count || 0)) {
        return (right.count || 0) - (left.count || 0);
      }
      return left.label.localeCompare(right.label);
    });
    node.children.forEach(finalize);
    delete node.childMap;
    return node;
  };

  return finalize(root);
}

function ensureExpandedForPath(scopePath) {
  if (!scopePath || scopePath === 'all') return;
  const segments = scopePath.split('/').filter(Boolean);
  let cumulative = '';
  segments.forEach((segment) => {
    cumulative = cumulative ? `${cumulative}/${segment}` : segment;
    state.expandedProjectPaths.add(cumulative);
  });
}

function modelColor(index) {
  const palette = ['#8bd3ff', '#F97316', '#D97757', '#f4b942', '#7dd3fc'];
  return palette[index % palette.length];
}

async function waitForApi() {
  while (!(window.pywebview && window.pywebview.api)) {
    await new Promise((resolve) => setTimeout(resolve, 50));
  }
}

async function callApi(method, ...args) {
  await waitForApi();
  return window.pywebview.api[method](...args);
}

async function init() {
  if (initStarted) return;
  initStarted = true;
  loadUiState();
  applyPanelWidths();
  bindEvents();
  bindResizeHandles();
  document.getElementById('sortSelect').value = state.sort;
  await Promise.all([
    loadProjects(),
    loadConversations(),
    loadDashboard(),
    updateStatusbar(),
  ]);
  renderMainPanel();
}

function bindEvents() {
  document.getElementById('overviewBtn').addEventListener('click', () => {
    state.view = 'dashboard';
    state.selectedConversationId = null;
    state.selectedConversationDetail = null;
    renderConversationList();
    renderMainPanel();
  });

  document.getElementById('filesBtn').addEventListener('click', toggleFilePanel);
  document.getElementById('closeFilesBtn').addEventListener('click', toggleFilePanel);
  document.getElementById('reindexBtn').addEventListener('click', reindexData);

  document.getElementById('searchInput').addEventListener('input', (event) => {
    clearTimeout(state.searchTimer);
    state.searchQuery = event.target.value.trim();
    state.searchTimer = setTimeout(async () => {
      await loadConversations();
    }, 180);
  });

  document.getElementById('sortSelect').addEventListener('change', async (event) => {
    state.sort = event.target.value;
    persistUiState();
    await loadConversations();
  });

  document.addEventListener('keydown', (event) => {
    if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'f') {
      event.preventDefault();
      document.getElementById('searchInput').focus();
    }
    if (event.key === 'Escape') {
      if (state.filePanelOpen) {
        toggleFilePanel();
        return;
      }
      state.view = 'dashboard';
      state.selectedConversationId = null;
      state.selectedConversationDetail = null;
      renderConversationList();
      renderMainPanel();
    }
  });
}

async function loadProjects() {
  const projects = await callApi('get_projects');
  state.projects = Array.isArray(projects) ? projects : [];
  renderProjects();
}

async function loadConversations() {
  const conversations = await callApi(
    'get_conversations',
    state.selectedProject,
    state.searchQuery || null,
    state.sort,
    250,
    0
  );
  state.conversations = Array.isArray(conversations) ? conversations : [];
  renderConversationList();
}

async function loadDashboard() {
  state.dashboard = await callApi(
    'get_dashboard_payload',
    state.selectedProject,
    state.dashboardRange,
    state.dashboardMonth
  );
  if (state.dashboard?.filters?.month) {
    state.dashboardMonth = state.dashboard.filters.month;
  }
  persistUiState();
  if (state.view === 'dashboard') {
    renderMainPanel();
  }
}

async function loadConversationDetail(sessionId) {
  state.selectedConversationId = sessionId;
  state.view = 'detail';
  renderConversationList();
  setMainHeader('Loading session detail...', 'Reading Claude Code transcript and usage breakdown.');
  document.getElementById('mainContent').innerHTML = renderLoadingState();
  const detail = await callApi('get_session_detail', sessionId);
  state.selectedConversationDetail = detail;
  renderMainPanel();
}

async function updateStatusbar() {
  const stats = await callApi('get_stats');
  state.appStats = stats;
  const terminal = await callApi('get_terminal_name');
  document.getElementById('statusSessions').textContent = `${Number(stats.total_conversations || 0).toLocaleString()} indexed sessions`;
  document.getElementById('statusTokens').textContent = `${formatTokens(stats.total_tokens)} tokens`;
  document.getElementById('statusCost').textContent = `${formatMoney(stats.estimated_cost_usd)} estimated cost`;
  document.getElementById('statusLastIndexed').textContent = `Last indexed: ${stats.last_indexed === 'never' ? 'never' : formatDateTime(stats.last_indexed)}`;
  document.getElementById('statusTerminal').textContent = `Resume terminal: ${terminal}`;
  document.getElementById('toolbarTitle').textContent = `Claude Code Session Dashboard · ${Number(stats.total_conversations || 0).toLocaleString()} sessions`;
}

function renderProjects() {
  const container = document.getElementById('projectList');
  document.getElementById('projectMeta').textContent = `${state.projects.length.toLocaleString()} projects`;
  ensureExpandedForPath(state.selectedProject);
  const tree = buildProjectTree(state.projects);
  container.innerHTML = `<div class="project-tree">${renderProjectNode(tree)}</div>`;

  container.querySelectorAll('.project-item').forEach((element) => {
    element.addEventListener('click', async () => {
      state.selectedProject = element.dataset.project;
      state.selectedConversationId = null;
      state.selectedConversationDetail = null;
      state.view = 'dashboard';
      ensureExpandedForPath(state.selectedProject);
      persistUiState();
      renderProjects();
      await loadConversations();
      await loadDashboard();
      renderMainPanel();
    });
  });

  container.querySelectorAll('.project-toggle').forEach((button) => {
    if (button.classList.contains('placeholder')) return;
    button.addEventListener('click', (event) => {
      event.stopPropagation();
      const scopePath = button.dataset.project;
      if (state.expandedProjectPaths.has(scopePath)) {
        state.expandedProjectPaths.delete(scopePath);
      } else {
        state.expandedProjectPaths.add(scopePath);
      }
      persistUiState();
      renderProjects();
    });
  });
}

function renderProjectNode(node) {
  const isExpanded = state.expandedProjectPaths.has(node.scopePath);
  const isActive = state.selectedProject === node.scopePath;
  const hasChildren = Array.isArray(node.children) && node.children.length > 0;
  const indent = Math.max(0, node.depth * 14);
  const toggleClass = hasChildren ? (isExpanded ? 'project-toggle expanded' : 'project-toggle') : 'project-toggle placeholder';
  const itemClass = `${isActive ? 'active ' : ''}${hasChildren ? 'folder-scope' : ''}`.trim();
  const meta = node.latest ? `<div class="project-row-meta">${escHtml(formatDate(node.latest))}</div>` : '';
  const children = hasChildren && isExpanded
    ? node.children.map((child) => renderProjectNode(child)).join('')
    : '';

  return `
    <div>
      <div class="project-item ${itemClass}" data-project="${escHtml(node.scopePath)}" style="padding-left:${12 + indent}px">
        <button class="${toggleClass}" data-project="${escHtml(node.scopePath)}" aria-label="${hasChildren ? 'Toggle folder' : 'No child folders'}">${hasChildren ? '›' : '·'}</button>
        <div class="project-label">
          <div class="project-name">${escHtml(node.label)}</div>
          ${meta}
        </div>
        <div class="project-count">${Number(node.count || 0).toLocaleString()}</div>
      </div>
      ${children}
    </div>
  `;
}

function renderConversationList() {
  const title = state.selectedProject === 'all'
    ? 'All sessions'
    : relativeProjectName(state.selectedProject);
  document.getElementById('conversationPanelTitle').textContent = title;
  document.getElementById('conversationCount').textContent = `${state.conversations.length.toLocaleString()} sessions`;

  const container = document.getElementById('conversationList');
  if (!state.conversations.length) {
    const missingProjectsDir = state.appStats && state.appStats.projects_dir_exists === false;
    const emptyTitle = state.searchQuery
      ? 'No matching sessions'
      : (missingProjectsDir ? 'Claude Code folder not found' : 'No indexed sessions yet');
    const emptyCopy = state.searchQuery
      ? 'Try a broader search query or switch to a different Claude Code project.'
      : (missingProjectsDir
        ? `The dashboard looks for Claude Code sessions in ${state.appStats.projects_dir}. Start Claude Code once or update claude_projects_dir in the config file.`
        : 'Run a reindex after Claude Code creates local session files, or switch to another project scope.');
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-shell">
          <div class="empty-icon">⌕</div>
          <div class="empty-title">${escHtml(emptyTitle)}</div>
          <div class="empty-copy">${escHtml(emptyCopy)}</div>
        </div>
      </div>
    `;
    return;
  }

  container.innerHTML = state.conversations.map((conversation) => {
    const active = state.selectedConversationId === conversation.session_id ? 'active' : '';
    const previewLabel = state.sort === 'oldest' ? 'First message' : 'Latest message';
    const previewText = state.sort === 'oldest'
      ? (conversation.first_preview || conversation.excerpt || 'No preview available.')
      : (conversation.last_preview || conversation.excerpt || 'No preview available.');
    const activityDate = state.sort === 'oldest'
      ? (conversation.created_at || conversation.first_message)
      : (conversation.last_message_at || conversation.last_message);
    return `
      <article class="conversation-card ${active}" data-session="${escHtml(conversation.session_id)}">
        <div class="conversation-topline">
          <div>
            <div class="conversation-title">${escHtml(conversation.title || '(untitled)')}</div>
            <div class="conversation-project">${escHtml(relativeProjectName(conversation.project_path))}</div>
          </div>
          <div class="conversation-date">${escHtml(formatDate(activityDate))}</div>
        </div>

        <div class="conversation-preview-label">${escHtml(previewLabel)}</div>
        <div class="conversation-excerpt">${escHtml(previewText)}</div>

        <div class="conversation-actions">
          <button class="pill-btn primary" data-action="resume">Resume</button>
          <button class="pill-btn" data-action="terminal">Terminal</button>
          <button class="pill-btn" data-action="vscode">VS Code</button>
          <button class="pill-btn" data-action="export">Export</button>
          <button class="pill-btn" data-action="copy">Copy command</button>
        </div>
      </article>
    `;
  }).join('');

  container.querySelectorAll('.conversation-card').forEach((card) => {
    const sessionId = card.dataset.session;
    card.addEventListener('click', () => loadConversationDetail(sessionId));
    card.querySelector('[data-action="resume"]').addEventListener('click', (event) => {
      event.stopPropagation();
      const conversation = state.conversations.find((entry) => entry.session_id === sessionId);
      openInTerminal(sessionId, conversation?.cwd || '');
    });
    card.querySelector('[data-action="terminal"]').addEventListener('click', (event) => {
      event.stopPropagation();
      const conversation = state.conversations.find((entry) => entry.session_id === sessionId);
      openInTerminal(sessionId, conversation?.cwd || '', 'terminal');
    });
    card.querySelector('[data-action="vscode"]').addEventListener('click', (event) => {
      event.stopPropagation();
      const conversation = state.conversations.find((entry) => entry.session_id === sessionId);
      openInTerminal(sessionId, conversation?.cwd || '', 'vscode');
    });
    card.querySelector('[data-action="export"]').addEventListener('click', (event) => {
      event.stopPropagation();
      exportConversation(sessionId, 'markdown');
    });
    card.querySelector('[data-action="copy"]').addEventListener('click', async (event) => {
      event.stopPropagation();
      const conversation = state.conversations.find((entry) => entry.session_id === sessionId);
      await copyText(conversation?.resume_command || `claude -r ${sessionId}`);
      showToast('Resume command copied', 'success');
    });
  });
}

function renderMetricCard(label, value, caption) {
  return `
    <div class="metric-card">
      <div class="metric-label">${label}</div>
      <div class="metric-value">${value}</div>
      <div class="metric-caption">${caption}</div>

}

function renderTopModels(models) {
  if (!models.length) {
    return '<div class="chart-caption">No model metadata was found in the indexed sessions.</div>';
  }
  const max = Math.max(...models.map((item) => item.tokens), 1);
  return `
    <div class="bar-list">
      ${models.map((model, index) => `
        <div class="bar-row">
          <div class="bar-label" title="${escHtml(model.label)}">${escHtml(model.label)}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(model.tokens / max) * 100}%; background:${modelColor(index)}"></div>
          </div>
          <div class="bar-value">${formatTokens(model.tokens)} · ${model.percentage}%</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderWeekdayActivity(rows) {
  if (!rows?.length) {
    return '<div class="chart-caption">No activity data available for this range.</div>';
  }
  const max = Math.max(...rows.map((item) => Number(item.seconds || 0)), 1);
  return `
    <div class="bar-list">
      ${rows.map((row, index) => `
        <div class="bar-row">
          <div class="bar-label">${escHtml(row.label)}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(Number(row.seconds || 0) / max) * 100}%; background:${modelColor(index)}"></div>
          </div>
          <div class="bar-value">${formatDuration(row.seconds)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderLineChart(points, key, color, formatter) {
  if (!points.length) {
    return '<div class="chart-caption">No activity recorded for this range.</div>';
  }

  const width = 920;
  const height = 260;
  const padding = { top: 18, right: 12, bottom: 36, left: 14 };
  const values = points.map((point) => Number(point[key] || 0));
  const max = Math.max(...values, 1);
  const innerWidth = width - padding.left - padding.right;
  const innerHeight = height - padding.top - padding.bottom;

  const coords = points.map((point, index) => {
    const x = padding.left + (index / Math.max(points.length - 1, 1)) * innerWidth;
    const y = padding.top + innerHeight - ((Number(point[key] || 0) / max) * innerHeight);
    return { x, y, value: Number(point[key] || 0), date: point.date };
  });

  const path = coords.map((coord, index) => `${index === 0 ? 'M' : 'L'} ${coord.x.toFixed(2)} ${coord.y.toFixed(2)}`).join(' ');
  const fillPath = `${path} L ${coords[coords.length - 1].x.toFixed(2)} ${padding.top + innerHeight} L ${coords[0].x.toFixed(2)} ${padding.top + innerHeight} Z`;
  const yGuides = [0.25, 0.5, 0.75, 1].map((tick) => ({
    value: max * tick,
    y: padding.top + innerHeight - (tick * innerHeight),
  }));
  const step = Math.max(1, Math.floor(points.length / 6));
  const xLabels = points.filter((_, index) => index % step === 0 || index === points.length - 1);

  return `
    <svg viewBox="0 0 ${width} ${height}" width="100%" height="260" role="img" aria-label="${escHtml(key)} chart">
      <defs>
        <linearGradient id="fill-${key}" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.35"></stop>
          <stop offset="100%" stop-color="${color}" stop-opacity="0.02"></stop>
        </linearGradient>
      </defs>
      ${yGuides.map((guide) => `
        <g>
          <line x1="${padding.left}" x2="${width - padding.right}" y1="${guide.y}" y2="${guide.y}" stroke="rgba(229,246,255,0.08)" stroke-dasharray="4 6"></line>
          <text x="${width - padding.right}" y="${guide.y - 6}" text-anchor="end" fill="rgba(243,245,250,0.5)" font-size="11">${escHtml(formatter(guide.value))}</text>
        </g>
      `).join('')}
      <path d="${fillPath}" fill="url(#fill-${key})"></path>
      <path d="${path}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
      ${coords.map((coord) => `
        <g>
          <circle cx="${coord.x}" cy="${coord.y}" r="3.5" fill="${color}"></circle>
          <title>${coord.date}: ${formatter(coord.value)}</title>
        </g>
      `).join('')}
      ${xLabels.map((point) => {
        const index = points.findIndex((entry) => entry.date === point.date);
        const x = padding.left + (index / Math.max(points.length - 1, 1)) * innerWidth;
        return `<text x="${x}" y="${height - 10}" fill="rgba(243,245,250,0.5)" font-size="11" text-anchor="middle">${new Date(point.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</text>`;
      }).join('')}
    </svg>
  `;
}

function renderModelTimeline(entries) {
  if (!entries.length) {
    return '<div class="chart-caption">No model activity recorded for this range.</div>';
  }
  const dailyTotals = entries.map((entry) => entry.models.reduce((sum, model) => sum + Number(model.tokens || 0), 0));
  const max = Math.max(...dailyTotals, 1);

  return `
    <div class="timeline-bars">
      ${entries.map((entry) => {
        const total = entry.models.reduce((sum, model) => sum + Number(model.tokens || 0), 0);
        const dateLabel = new Date(entry.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        const segments = entry.models.map((model, index) => {
          const pct = total ? (Number(model.tokens || 0) / total) * 100 : 0;
          return `<div class="timeline-segment" style="height:${pct}%; background:${model.model === 'other' ? '#6b7280' : modelColor(index)}" title="${escHtml(model.label)}: ${formatTokens(model.tokens)}"></div>`;
        }).join('');
        return `
          <div class="timeline-day">
            <div class="timeline-stack" title="${escHtml(dateLabel)} · ${formatTokens(total)} tokens" style="height:${Math.max(16, (total / max) * 200)}px">${segments}</div>
            <div class="timeline-label">${escHtml(dateLabel)}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderHistogram(buckets) {
  if (!buckets.length) {
    return '<div class="chart-caption">No session size data available.</div>';
  }
  const max = Math.max(...buckets.map((bucket) => bucket.count), 1);
  return `
    <div class="histogram">
      ${buckets.map((bucket) => `
        <div class="histogram-bar">
          <div class="histogram-value">${bucket.count}</div>
          <div class="histogram-fill" style="height:${Math.max(4, (bucket.count / max) * 150)}px"></div>
          <div class="histogram-label">${escHtml(bucket.label)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderUsageHeatmap(payload) {
  const cells = payload?.cells || [];
  const max = payload?.max_tokens || 1;
  const map = new Map(cells.map((cell) => [`${cell.weekday}-${cell.hour}`, cell]));
  const weekdays = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const hours = Array.from({ length: 24 }, (_, hour) => hour);
  let html = '<div class="heatmap-grid">';
  html += '<div></div>';
  html += hours.map((hour) => `<div class="heatmap-hour">${String(hour).padStart(2, '0')}</div>`).join('');
  weekdays.forEach((day, weekdayIndex) => {
    html += `<div class="heatmap-day">${day}</div>`;
    hours.forEach((hour) => {
      const cell = map.get(`${weekdayIndex}-${hour}`) || { tokens: 0, assistant_messages: 0 };
      const intensity = cell.tokens === 0 ? 0 : Math.max(0.12, cell.tokens / max);
      const background = cell.tokens === 0
        ? 'rgba(229,246,255,0.05)'
        : `rgba(249, 115, 22, ${Math.min(1, intensity * 0.92)})`;
      html += `<div class="heatmap-cell" title="${day} ${String(hour).padStart(2, '0')}:00 · ${formatTokens(cell.tokens)} tokens · ${cell.assistant_messages} assistant messages" style="background:${background}"></div>`;
    });
  });
  html += '</div>';
  html += `
    <div class="heatmap-legend">
      <span>Lower activity</span>
      <span class="legend-swatch" style="background:rgba(229,246,255,0.12)"></span>
      <span class="legend-swatch" style="background:rgba(249,115,22,0.45)"></span>
      <span class="legend-swatch" style="background:rgba(249,115,22,0.92)"></span>
      <span>Higher activity</span>
    </div>
  `;
  return html;
}

  return `
    <div class="table-shell">
      <table>
        <thead>

            <th>Session</th>
            <th>Project</th>
            <th>Last activity</th>
            <th>Est. time</th>
            <th>Tokens</th>
            <th>Estimated cost</th>

  if (!detail || !detail.conversation) {

    <button class="toolbar-btn primary" onclick="openInTerminal('${escHtml(conversation.session_id)}', ${JSON.stringify(conversation.cwd || '')})">Resume</button>
    <button class="toolbar-btn" onclick="openInTerminal('${escHtml(conversation.session_id)}', ${JSON.stringify(conversation.cwd || '')}, 'terminal')">Terminal</button>
    <button class="toolbar-btn" onclick="openInTerminal('${escHtml(conversation.session_id)}', ${JSON.stringify(conversation.cwd || '')}, 'vscode')">VS Code</button>
    <button class="toolbar-btn" onclick="exportConversation('${escHtml(conversation.session_id)}', 'markdown')">Export</button>
  `;
  setMainHeader(conversation.title || '(untitled)', relativeProjectName(conversation.project_path), actions);
  document.getElementById('overviewBtn').classList.remove('active');

  document.getElementById('mainContent').innerHTML = `
    <section class="detail-header">
      <div class="hero-kicker">Session detail</div>
      <div class="hero-title" style="font-size:32px">${escHtml(conversation.title || '(untitled)')}</div>
      <div class="hero-copy" id="detailPreview">${escHtml(detailPreview)}</div>
      <div class="detail-meta">
        <div class="meta-chip">${escHtml(relativeProjectName(conversation.project_path))}</div>
        <div class="meta-chip">${escHtml(formatDateTime(conversation.last_message_at || conversation.last_message))}</div>
        <div class="meta-chip">${escHtml(conversation.model_display || 'Unknown model')}</div>
        <div class="meta-chip">Session ${escHtml(shortSessionId(conversation.session_id))}</div>
      </div>
      <div class="manual-resume">
        <div class="manual-resume-label">Manual resume command</div>
        <code>${escHtml(conversation.resume_command || `claude -r ${conversation.session_id}`)}</code>
      </div>
      <div class="detail-grid">
        ${renderDetailStat('Total tokens', formatTokens(conversation.total_tokens))}
        ${renderDetailStat('Est. active time', formatDuration(conversation.estimated_active_seconds))}
        ${renderDetailStat('Estimated cost', formatMoney(conversation.estimated_cost_usd))}
        ${renderDetailStat('Messages', Number(conversation.message_count || 0).toLocaleString())}
        ${renderDetailStat('Model count', Number(conversation.model_count || 0).toLocaleString())}
      </div>
    </section>

    <section class="section-grid">
      <div class="surface-card span-5">
        <div class="section-heading">
          <div>
            <div class="section-title">Token mix</div>
            <div class="section-subtitle">Assistant-side token categories for this session</div>
          </div>
        </div>
        <div class="bar-list">
          ${[
            ['Input tokens', conversation.input_tokens, '#8bd3ff'],
            ['Output tokens', conversation.output_tokens, '#F97316'],
            ['Cache write tokens', conversation.cache_creation_input_tokens, '#D97757'],
            ['Cache read tokens', conversation.cache_read_input_tokens, '#f4b942'],
          ].map(([label, value, color]) => {
            const total = Math.max(conversation.total_tokens || 1, 1);
            return `
              <div class="bar-row">
                <div class="bar-label">${label}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${(Number(value || 0) / total) * 100}%; background:${color}"></div></div>
                <div class="bar-value">${formatTokens(value)}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <div class="surface-card span-7">
        <div class="section-heading">
          <div>
            <div class="section-title">Model breakdown</div>
            <div class="section-subtitle">Per-model share of tokens and estimated spend inside this session</div>
          </div>
        </div>
        ${renderSessionModels(detail.model_breakdown)}
      </div>

      <div class="surface-card span-12">
        <div class="section-heading">
          <div>
            <div class="section-title">Transcript</div>
            <div class="section-subtitle">Rendered from the indexed Claude Code JSONL messages. Newest-first makes the latest message immediately visible.</div>
          </div>
          <div>
            <select class="dashboard-select" id="transcriptOrderSelect">
              <option value="newest" ${state.transcriptOrder === 'newest' ? 'selected' : ''}>Newest first</option>
              <option value="oldest" ${state.transcriptOrder === 'oldest' ? 'selected' : ''}>Oldest first</option>
            </select>
          </div>
        </div>
        <div class="transcript">
          ${detail.messages.map(renderMessageCard).join('')}
        </div>
      </div>
    </section>
  `;

  document.getElementById('transcriptOrderSelect')?.addEventListener('change', (event) => {
    state.transcriptOrder = event.target.value;
    persistUiState();
    applyTranscriptOrder();
  });
  applyTranscriptOrder();
  document.getElementById('mainContent').querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
}

function applyTranscriptOrder() {
  const transcript = document.querySelector('.transcript');
  if (!transcript) return;
  transcript.classList.toggle('reverse', state.transcriptOrder === 'newest');
  updateDetailPreview();
}

function cleanPreviewText(text, fallback = 'No preview available for this session.') {
  const normalized = String(text || '')
    .replace(/<[^>]+>/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  if (!normalized) return fallback;
  return normalized.length > 240 ? `${normalized.slice(0, 237).trim()}...` : normalized;
}

function getDetailPreview(detail) {
  const messages = Array.isArray(detail?.messages) ? detail.messages : [];
  const nonEmptyMessages = messages.filter((message) => String(message?.content || '').trim());
  if (!nonEmptyMessages.length) {
    return cleanPreviewText(detail?.conversation?.excerpt);
  }
  const source = state.transcriptOrder === 'newest'
    ? nonEmptyMessages[nonEmptyMessages.length - 1]
    : nonEmptyMessages[0];
  return cleanPreviewText(source?.content, cleanPreviewText(detail?.conversation?.excerpt));
}

function updateDetailPreview() {
  const preview = document.getElementById('detailPreview');
  if (!preview || !state.selectedConversationDetail) return;
  preview.textContent = getDetailPreview(state.selectedConversationDetail);
}

function renderDetailStat(label, value) {
  return `
    <div class="detail-stat">
      <div class="metric-label">${label}</div>
      <div class="value">${value}</div>
    </div>
  `;
}

function renderSessionModels(models) {
  if (!models.length) {
    return '<div class="chart-caption">No assistant model metadata found for this session.</div>';
  }
  const max = Math.max(...models.map((item) => item.tokens), 1);
  return `
    <div class="bar-list">
      ${models.map((model, index) => `
        <div class="bar-row">
          <div class="bar-label">${escHtml(model.label)}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(model.tokens / max) * 100}%; background:${modelColor(index)}"></div>
          </div>
          <div class="bar-value">${formatTokens(model.tokens)} · ${formatMoney(model.estimated_cost_usd)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderMessageCard(message) {
  const role = message.role === 'user' ? 'You' : 'Claude';
  const model = message.model ? message.model : null;
  const body = message.content ? marked.parse(message.content) : '<p><em>Empty message</em></p>';
  return `
    <article class="message-card ${escHtml(message.role)}">
      <div class="message-header">
        <div class="message-role">${escHtml(role)}</div>
        <div class="message-meta">
          <span>${escHtml(formatDateTime(message.timestamp))}</span>
          ${message.token_count ? `<span>${formatTokens(message.token_count)} tokens</span>` : ''}
          ${model ? `<span>${escHtml(model)}</span>` : ''}
          ${message.estimated_cost_usd ? `<span>${formatMoney(message.estimated_cost_usd)}</span>` : ''}
        </div>
      </div>
      <div class="message-body markdown-render">${body}</div>
    </article>
  `;
}

function renderLoadingState() {
  return `
    <div class="empty-state">
      <div class="empty-shell">
        <div class="empty-icon">…</div>
        <div class="empty-title">Loading</div>
        <div class="empty-copy">Reading your local Claude Code session index.</div>
      </div>
    </div>
  `;
}

function terminalLabel(terminal) {
  if (terminal === 'terminal') return 'Terminal';
  if (terminal === 'vscode') return 'VS Code';
  return 'resume command';
}

async function openInTerminal(sessionId, cwd, terminal = null) {
  const result = await callApi('open_in_terminal', sessionId, cwd || '', terminal);
  if (!result.ok) {
    showToast(result.error || 'Failed to open terminal session');
    return;
  }
  showToast(`Opened Claude ${terminalLabel(terminal)}`, 'success');
}

async function exportConversation(sessionId, format) {
  const result = await callApi('export_conversation', sessionId, format);
  if (!result.ok) {
    showToast(result.error || 'Export failed');
    return;
  }

  const blob = new Blob([result.content], { type: format === 'json' ? 'application/json' : 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = result.filename;
  link.click();
  URL.revokeObjectURL(url);
  showToast('Conversation exported', 'success');
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    await callApi('copy_to_clipboard', text);
  }
}

function toggleFilePanel() {
  state.filePanelOpen = !state.filePanelOpen;
  document.getElementById('filePanel').classList.toggle('open', state.filePanelOpen);
  document.getElementById('filesBtn').classList.toggle('active', state.filePanelOpen);
  document.documentElement.style.setProperty('--file-width', state.filePanelOpen ? '370px' : '0px');
  document.documentElement.style.setProperty('--file-handle-width', state.filePanelOpen ? '6px' : '0px');
  document.getElementById('fileResizeHandle').classList.toggle('hidden', !state.filePanelOpen);
  if (state.filePanelOpen && !state.fileTree) {
    loadFileTree();
  }
}

async function loadFileTree() {
  document.getElementById('fileTree').innerHTML = '<div class="chart-caption">Loading file tree...</div>';
  const tree = await callApi('get_file_tree');
  state.fileTree = tree;
  renderFileTree();
  document.getElementById('filePreview').innerHTML = `
    <div class="file-preview-shell">
      <div class="chart-caption">Select a file to preview it here.</div>
    </div>
  `;
}

function renderFileTree() {
  const container = document.getElementById('fileTree');
  if (!state.fileTree || !state.fileTree.children) {
    container.innerHTML = '<div class="chart-caption">No file tree available.</div>';
    return;
  }
  container.innerHTML = renderFileTreeNode(state.fileTree, 0);
  container.querySelectorAll('.tree-item[data-type="file"]').forEach((element) => {
    element.addEventListener('click', () => loadFilePreview(element.dataset.path));
  });
}

function renderFileTreeNode(node, depth) {
  if (!node) return '';
  if (node.type === 'file') {
    const active = state.selectedFilePath === node.path ? 'active' : '';
    return `
      <div class="tree-item ${active}" data-type="file" data-path="${escHtml(node.path)}">
        <span class="tree-indent" style="margin-left:${depth * 12}px"></span>
        <span>📄</span>
        <span>${escHtml(node.name)}</span>
      </div>
    `;
  }

  const children = (node.children || []).map((child) => renderFileTreeNode(child, depth + 1)).join('');
  return `
    <div class="tree-item" data-type="dir">
      <span class="tree-indent" style="margin-left:${depth * 12}px"></span>
      <span>📁</span>
      <span>${escHtml(node.name)}</span>
    </div>
    ${children}
  `;
}

async function loadFilePreview(path) {
  state.selectedFilePath = path;
  renderFileTree();
  const result = await callApi('read_file', path);
  if (result.type === 'image') {
    document.getElementById('filePreview').innerHTML = `
      <div class="file-preview-shell"><img src="${result.content}" alt="${escHtml(path)}" style="max-width:100%; border-radius:12px;"></div>
    `;
    return;
  }
  if (result.type === 'svg') {
    document.getElementById('filePreview').innerHTML = `<div class="file-preview-shell">${result.content}</div>`;
    return;
  }
  if (result.type === 'text') {
    const code = escHtml(result.content);
    document.getElementById('filePreview').innerHTML = `
      <div class="file-preview-shell">
        <pre><code class="language-${escHtml(result.language || 'plaintext')}">${code}</code></pre>
      </div>
    `;
    document.getElementById('filePreview').querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
    return;
  }
  document.getElementById('filePreview').innerHTML = `
    <div class="file-preview-shell"><div class="chart-caption">${escHtml(result.content || 'Unable to preview file.')}</div></div>
  `;
}

async function reindexData() {
  showToast('Reindexing Claude Code sessions...');
  const result = await callApi('reindex', false);
  if (!result.ok) {
    showToast(result.error || 'Reindex failed');
    return;
  }
  await Promise.all([
    loadProjects(),
    loadConversations(),
    loadDashboard(),
    updateStatusbar(),
  ]);
  showToast('Index refreshed', 'success');
}

function showToast(message, variant = '') {
  const toast = document.createElement('div');
  toast.className = `toast ${variant}`.trim();
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3400);
}

function formatMonthLabel(monthStr) {
  if (!monthStr) return '';
  const [year, month] = monthStr.split('-').map(Number);
  if (!year || !month) return monthStr;
  return new Date(year, month - 1, 1).toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
}

function applyPanelWidths() {
  document.documentElement.style.setProperty('--sidebar-width', '250px');
  document.documentElement.style.setProperty('--list-width', '430px');
  document.documentElement.style.setProperty('--file-width', state.filePanelOpen ? '370px' : '0px');
  document.documentElement.style.setProperty('--file-handle-width', state.filePanelOpen ? '6px' : '0px');
}

function bindResizeHandles() {
  const handles = document.querySelectorAll('.resize-handle[data-resize]');
  handles.forEach((handle) => {
    handle.addEventListener('pointerdown', (event) => {
      if (handle.classList.contains('hidden')) return;
      const type = handle.dataset.resize;
      const startX = event.clientX;
      const rootStyles = getComputedStyle(document.documentElement);
      const startSidebar = parseFloat(rootStyles.getPropertyValue('--sidebar-width'));
      const startList = parseFloat(rootStyles.getPropertyValue('--list-width'));
      const startFile = parseFloat(rootStyles.getPropertyValue('--file-width')) || 0;
      handle.classList.add('active');
      handle.setPointerCapture(event.pointerId);

      const onMove = (moveEvent) => {
        const delta = moveEvent.clientX - startX;
        if (type === 'sidebar') {
          const value = Math.min(420, Math.max(180, startSidebar + delta));
          document.documentElement.style.setProperty('--sidebar-width', `${value}px`);
        } else if (type === 'list') {
          const value = Math.min(680, Math.max(280, startList + delta));
          document.documentElement.style.setProperty('--list-width', `${value}px`);
        } else if (type === 'file') {
          const value = Math.min(560, Math.max(240, startFile - delta));
          document.documentElement.style.setProperty('--file-width', `${value}px`);
        }
      };

      const onEnd = () => {
        handle.classList.remove('active');
        handle.removeEventListener('pointermove', onMove);
        handle.removeEventListener('pointerup', onEnd);
        handle.removeEventListener('pointercancel', onEnd);
      };

      handle.addEventListener('pointermove', onMove);
      handle.addEventListener('pointerup', onEnd);
      handle.addEventListener('pointercancel', onEnd);
    });
  });
}

window.addEventListener('pywebviewready', init);
if (window.pywebview) {
  init();
}
</script>
